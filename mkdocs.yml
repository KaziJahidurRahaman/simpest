site_name: simpest
site_description: Simpest
site_author: KaziJahidurRahaman
site_url: https://KaziJahidurRahaman.github.io/simpest
repo_url: https://github.com/KaziJahidurRahaman/simpest

copyright: "Copyright &copy; 2024 - 2024 Kazi Jahidur Rahaman"

theme:
    palette:
        - scheme: default
          #   primary: blue
          #   accent: indigo
          toggle:
              icon: material/toggle-switch-off-outline
              name: Switch to dark mode
        - scheme: slate
          primary: indigo
          accent: indigo
          toggle:
              icon: material/toggle-switch
              name: Switch to light mode
    name: material
    icon:
        repo: fontawesome/brands/github
    # logo: assets/logo.png
    # favicon: assets/favicon.png
    features:
        - navigation.instant
        - navigation.tracking
        - navigation.top
        - search.highlight
        - search.share
    custom_dir: "docs/overrides"
    font:
        text: Google Sans
        code: Regular

plugins:
    - search
    - mkdocstrings
    - git-revision-date
    - git-revision-date-localized:
          enable_creation_date: true
          type: timeago
    # - pdf-export
    - mkdocs-jupyter:
          include_source: True
          ignore_h1_titles: True
          execute: False
          allow_errors: false
          ignore: ["conf.py"]
          execute_ignore: ["*ignore.ipynb"]

markdown_extensions:
    - admonition
    - abbr
    - attr_list
    - def_list
    - footnotes
    - meta
    - md_in_html
    - pymdownx.superfences
    - pymdownx.highlight:
          linenums: true
    - toc:
          permalink: true

# extra:
#     analytics:
#         provider: google
#         property: UA-XXXXXXXXX-X

nav:
    - Home: index.md
    - Installation: installation.md
    - Usage: usage.md
    - Contributing: contributing.md
    - FAQ: faq.md
    - Changelog: changelog.md
    - Report Issues: https://github.com/KaziJahidurRahaman/simpest/issues
    - Examples:
        - examples/intro.ipynb
    - API Reference:
          - simpest module: simpest.md
          - models:
              - models package: models/models_package.md
              - simplace module: models/simplace.md
              - franchestyn module: models/franchestyn.md
              - franchestyn crop module: models/fr_crop_model.md
              - franchestyn disease module: models/fr_disease_model.md
              - franchestyn fungicide module: models/fr_fungicide_model.md
              - franchestyn optimization module: models/fr_optimizer.md
              - franchestyn runner module: models/fr_runner.md
              - franchestyn data module: models/fr_data.md
              - franchestyn utilities module: models/fr_utilities.md
              - franchestyn parameter reader module: models/fr_param_reader.md
              - franchestyn reference reader module: models/fr_reference_reader.md
              - franchestyn weather reader module: models/fr_weather_reader.md
        #   - common module: common.md
